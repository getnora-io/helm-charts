replicaCount: 1

image:
  repository: ghcr.io/getnora-io/nora
  # -- Overrides the image tag. Defaults to Chart.appVersion.
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  fsGroup: 1000

securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  readOnlyRootFilesystem: true

service:
  type: ClusterIP
  port: 4000

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: registry.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []
  #  - secretName: registry-tls
  #    hosts:
  #      - registry.example.com

persistence:
  enabled: true
  size: 10Gi
  storageClass: ""
  accessModes:
    - ReadWriteOnce
  annotations: {}

config:
  server:
    host: "0.0.0.0"
    port: 4000
  storage:
    mode: local
    path: /data/storage
  docker:
    proxy_timeout: 60
    # -- Docker upstream registries for proxy/cache.
    # Auth credentials should come from existingSecret, not inline here.
    upstreams: []
    #  - url: https://registry-1.docker.io
    #  - url: https://private.registry.io
    #    auth: "user:token"
  gc:
    enabled: true
    interval: 86400
  retention:
    enabled: false
    interval: 86400
    rules: []

# -- Name of an existing Secret to mount as /config/secrets.toml.
# Use this to keep registry credentials out of values.yaml.
# The Secret should contain a key "secrets.toml" with TOML content, e.g.:
#   [[docker.upstreams]]
#   url = "https://private.registry.io"
#   auth = "user:token"
# These upstreams are merged with config.docker.upstreams (Secret wins for same URL).
existingSecret: ""

# -- Extra environment variables passed to the NORA container.
env: {}
  # NORA_AUTH_ENABLED: "true"
  # NORA_RATE_LIMIT_ENABLED: "true"

# -- Sensitive environment variables stored in a Secret.
secrets: {}
  # NORA_STORAGE_S3_ACCESS_KEY: ""
  # NORA_STORAGE_S3_SECRET_KEY: ""

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    memory: 512Mi

nodeSelector: {}
tolerations: []
affinity: {}
