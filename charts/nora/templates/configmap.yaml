apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "nora.fullname" . }}-config
  labels:
    {{- include "nora.labels" . | nindent 4 }}
data:
  config.toml: |
    [server]
    host = {{ .Values.config.server.host | quote }}
    port = {{ .Values.config.server.port | default 4000 }}
    {{- if .Values.config.server.public_url }}
    public_url = {{ .Values.config.server.public_url | quote }}
    {{- else if and .Values.ingress.enabled .Values.ingress.hosts }}
    {{- $host := (index .Values.ingress.hosts 0).host }}
    {{- $scheme := ternary "https" "http" (gt (len .Values.ingress.tls) 0) }}
    public_url = {{ printf "%s://%s" $scheme $host | quote }}
    {{- else if and .Values.httpRoute.enabled .Values.httpRoute.hostnames }}
    public_url = {{ printf "https://%s" (index .Values.httpRoute.hostnames 0) | quote }}
    {{- else }}
    {{- fail "config.server.public_url is required when ingress and httpRoute are both disabled. Set config.server.public_url in your values (e.g. https://registry.example.com)." }}
    {{- end }}

    {{- if .Values.config.registries }}

    [registries]
    {{- if kindIs "string" .Values.config.registries.enable }}
    enable = {{ .Values.config.registries.enable | quote }}
    {{- else if kindIs "slice" .Values.config.registries.enable }}
    enable = [{{- range $i, $v := .Values.config.registries.enable }}{{- if $i }}, {{ end }}{{ $v | quote }}{{- end }}]
    {{- end }}
    {{- end }}

    [storage]
    mode = {{ .Values.config.storage.mode | quote }}
    path = {{ .Values.config.storage.path | quote }}
    {{- if eq .Values.config.storage.mode "s3" }}
    s3_url = {{ .Values.config.storage.s3_url | quote }}
    bucket = {{ .Values.config.storage.bucket | quote }}
    s3_region = {{ .Values.config.storage.s3_region | default "us-east-1" | quote }}
    {{- end }}

    {{- if or .Values.config.docker.upstreams .Values.config.docker.proxy_timeout }}
    [docker]
    proxy_timeout = {{ .Values.config.docker.proxy_timeout | default 60 }}
    {{- range .Values.config.docker.upstreams }}

    [[docker.upstreams]]
    url = {{ .url | quote }}
    {{- if .auth }}
    auth = {{ .auth | quote }}
    {{- end }}
    {{- end }}
    {{- end }}

    [gc]
    enabled = {{ .Values.config.gc.enabled }}
    interval = {{ .Values.config.gc.interval }}

    [retention]
    enabled = {{ .Values.config.retention.enabled }}
    interval = {{ .Values.config.retention.interval }}
    {{- if .Values.config.retention.rules }}
    {{- range .Values.config.retention.rules }}

    [[retention.rules]]
    {{- range $k, $v := . }}
    {{ $k }} = {{ $v | quote }}
    {{- end }}
    {{- end }}
    {{- end }}

    {{- if .Values.config.auth.enabled }}
    {{- $htpasswdFile := include "nora.auth.htpasswdFile" . }}

    [auth]
    enabled = {{ .Values.config.auth.enabled }}
    {{- if $htpasswdFile }}
    htpasswd_file = {{ $htpasswdFile | quote }}
    {{- end }}
    token_storage = {{ .Values.config.auth.token_storage | quote }}
    anonymous_read = {{ .Values.config.auth.anonymous_read }}
    {{- if .Values.config.auth.oidc.enabled }}

    [auth.oidc]
    enabled = {{ .Values.config.auth.oidc.enabled }}
    leeway_secs = {{ .Values.config.auth.oidc.leeway_secs }}
    jwks_cache_secs = {{ .Values.config.auth.oidc.jwks_cache_secs }}
    {{- range .Values.config.auth.oidc.providers }}

    [[auth.oidc.providers]]
    name = {{ .name | quote }}
    issuer = {{ .issuer | quote }}
    audience = {{ .audience | quote }}
    {{- if .algorithms }}
    algorithms = [{{- range $i, $v := .algorithms }}{{- if $i }}, {{ end }}{{ $v | quote }}{{- end }}]
    {{- end }}
    max_token_lifetime_secs = {{ .max_token_lifetime_secs }}
    enabled = {{ .enabled | default true }}
    {{- if .jwks_uri }}
    jwks_uri = {{ .jwks_uri | quote }}
    {{- end }}
    {{- range .role_rules }}

    [[auth.oidc.providers.role_rules]]
    pattern = {{ .pattern | quote }}
    role = {{ .role | quote }}
    {{- end }}
    {{- end }}
    {{- end }}
    {{- end }}

    [rate_limit]
    enabled = {{ .Values.config.rate_limit.enabled }}
    {{- if .Values.config.rate_limit.enabled }}
    auth_rps = {{ .Values.config.rate_limit.auth_rps }}
    auth_burst = {{ .Values.config.rate_limit.auth_burst }}
    upload_rps = {{ .Values.config.rate_limit.upload_rps }}
    upload_burst = {{ .Values.config.rate_limit.upload_burst }}
    general_rps = {{ .Values.config.rate_limit.general_rps }}
    general_burst = {{ .Values.config.rate_limit.general_burst }}
    {{- end }}
